<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="95" fill="none" stroke="black" stroke-width="20"/>

  <!-- Rabbit silhouette -->
  <g transform="translate(100, 90)">
    <!-- Body -->
    <ellipse cx="0" cy="10" rx="18" ry="25" fill="black"/>

    <!-- Head -->
    <circle cx="0" cy="-8" r="15" fill="black"/>

    <!-- Ears -->
    <polygon points="-6,-20 -3,-35 0,-32 3,-20" fill="black"/>
    <polygon points="6,-20 3,-35 0,-32 -3,-20" fill="black"/>

    <!-- Eyes -->
    <circle cx="-5" cy="-10" r="2" fill="white"/>
    <circle cx="5" cy="-10" r="2" fill="white"/>
  </g>

  <!-- Left hand -->
  <g transform="translate(35, 105)">
    <path d="M 0 0 Q -5 5 -8 8" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 0 8 Q -3 12 -5 16" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Right tail -->
  <g transform="translate(140, 80)">
    <path d="M 0 0 Q 15 -5 20 -25" stroke="black" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 18 -22 L 22 -28" stroke="black" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 20 -25 L 25 -32" stroke="black" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>